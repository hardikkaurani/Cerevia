name: Production Quality Gate

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  NODE_VERSION: "20.x"

jobs:
  validate:
    name: Validate (Build, Lint, Test, Typecheck)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate
        
      - name: Run ESLint
        run: npm run lint

      - name: TypeScript Type Check
        run: npx tsc --noEmit

      - name: Run Unit & Integration Tests
        run: npm run test --if-present

      - name: Validate Production Build
        run: npm run build
        env:
          # Mock environment variables required for build if necessary
          DATABASE_URL: "postgresql://postgres:postgres@localhost:5432/cerevia?schema=public"
          JWT_SECRET: "ci-dummy-jwt-secret-for-build"
          REDIS_URL: "redis://localhost:6379"

      - name: Check for Duplicate Dependencies
        run: npx npm-dedupe --dry-run
        continue-on-error: true # Warning only for now
